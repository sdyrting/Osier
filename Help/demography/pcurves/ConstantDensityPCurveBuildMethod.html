<h2>Constant Density</h2>
<p>
Given a set of populations  \(P_i\) for age intervals \([x_{i-1},x_{i})\) the population age density at age \(a\) is
$$
	p(a) = \frac{P_i}{x_i-x_{i-1}}\quad \mathrm{where} \quad a\in [x_{i-1},x_i)
$$
</p>
