<h2>LifeExp(MortHandle,Age)</h2>
<p>Returns \(e_x\) the expectation of life at Age \(x\). It is calculated as the ratio of <a href="YearsLivedAfter.html"> person-years lived after</a>  \(x\) and the <a href="SurvFrac.html"> survival fraction</a> 
$$
e_x = \frac{T_x}{l(x)}
$$
</p>
