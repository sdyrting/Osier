<h2>Elandt-Johnson</h2>
<p>Builds a mortality curve using six-point Lagrange interpolation of survival fraction for ages 1-74 and a Gompertz curve for ages above 75. See Elandt-Johnson, R. C. and Johnson, N. L. (1980). Survival Models and Data Analysis. John
