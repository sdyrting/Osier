<h2>GridToObject(Handle, ObjectType, Grid)</h2>
<p>Creates an object from a Grid and stores it in the object pool. The object body and subtables 
are passed as a single matrix in the same format as output by <a href="DisplayObj.html">DisplayObj</a>.
See <a href="CreateObj.html">CreateObj</a> for an alternative method of creating objects.</p>
