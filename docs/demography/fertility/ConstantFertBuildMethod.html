<h2>Constant Fertility</h2>
<p>
Given a set of fertility rates \(f_i\) for age intervals \([x_i,y_i)\) the fertility rate at age \(a\) is
$$
	f(a) = f_i\quad \mathrm{where} \quad a\in [y_{i-1},y_i)
$$
